<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA Meta -->
    <meta name="application-name" content="Address-Web" />
    <meta name="theme-color" content="#1B4F8A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Address-Web" />
    <meta name="msapplication-TileColor" content="#1B4F8A" />
    <meta name="msapplication-TileImage" content="/icons/icon-144.png" />

    <!-- SEO -->
    <meta name="description" content="Donnez une adresse numérique précise à chaque lieu en Afrique. Créez, partagez et naviguez vers n'importe quel endroit avec un code AW simple." />
    <meta name="keywords" content="adresse, Afrique, numérique, géolocalisation, livraison, navigation" />

    <!-- Open Graph -->
    <meta property="og:title" content="Address-Web — Adressage numérique Afrique" />
    <meta property="og:description" content="Donnez une adresse numérique précise à chaque lieu en Afrique" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />
    <link rel="shortcut icon" href="/icons/favicon.ico" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <title>Address-Web — Adressage numérique Afrique</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Enregistrement Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW enregistré:', reg.scope))
            .catch(err => console.log('SW erreur:', err));
        });
      }
    </script>
  </body>
</html>
